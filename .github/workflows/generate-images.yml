name: Generate Creature Images

on:
  schedule:
    # 매일 05:00 UTC — 하루 IMAGE_BATCH장씩 생성 (DALL-E 3 standard 1024 = 장당 $0.04)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: '이번 실행에서 생성할 이미지 수'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Select creatures without images
        env:
          IMAGE_BATCH: ${{ github.event.inputs.batch || '10' }}
        run: node scripts/select-images-to-generate.mjs

      - name: Generate images (DALL-E 3)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-images.mjs

      - name: Merge into CREATURE_IMAGE_MAP
        run: node scripts/apply-image-map.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet lib/folklore-data.ts scripts/image-gen-progress.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/creatures/ scripts/image-gen-progress.json lib/folklore-data.ts
          COUNT=$(node -e "console.log(Object.keys(require('./scripts/image-gen-progress.json')).length)")
          git commit -m "Auto-generate: creature images (total generated: ${COUNT})"
          git pull --rebase origin main
          git push
